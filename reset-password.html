<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset your MileStory password</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #FCFAF7;
    color: #1D2228;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 420px;
    background: #FFFFFF;
    border: 1px solid #E6E0DA;
    border-radius: 20px;
    padding: 32px 28px;
  }
  h1 {
    font-size: 24px;
    font-weight: 900;
    margin: 0 0 8px;
    letter-spacing: -0.5px;
  }
  p.subtitle {
    color: #737A82;
    font-size: 14px;
    line-height: 20px;
    margin: 0 0 24px;
  }
  label {
    display: block;
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: #4E565E;
    margin-bottom: 7px;
  }
  input {
    width: 100%;
    background: #FFFFFF;
    border: 1px solid #E6E0DA;
    border-radius: 14px;
    color: #1D2228;
    font-size: 15px;
    padding: 14px;
    margin-bottom: 16px;
  }
  input:focus {
    outline: none;
    border-color: #B45A2B;
  }
  .hint {
    font-size: 12px;
    color: #8B9096;
    margin: -10px 0 16px;
  }
  button {
    width: 100%;
    background: #B45A2B;
    color: #FFFFFF;
    border: none;
    border-radius: 17px;
    padding: 16px;
    font-size: 16px;
    font-weight: 900;
    cursor: pointer;
  }
  button:disabled {
    opacity: 0.6;
    cursor: default;
  }
  .message {
    font-size: 14px;
    line-height: 20px;
    padding: 14px;
    border-radius: 12px;
    margin-bottom: 16px;
  }
  .message.error {
    background: #FDEDEA;
    color: #B3261E;
  }
  .message.success {
    background: #EAF6ED;
    color: #1E7B34;
  }
  .logo {
    font-size: 15px;
    font-weight: 900;
    letter-spacing: -0.5px;
    color: #B45A2B;
    margin-bottom: 18px;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">MileStory</div>
    <div id="app">
      <h1>Checking your link&hellip;</h1>
      <p class="subtitle">Give it a second while we verify this reset link.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://upwfolnealnowvjskxxb.supabase.co";
    const SUPABASE_KEY = "sb_publishable_5dgqAEdmPLMGymLJN93pPQ_KpyNeSF1";

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: { detectSessionInUrl: true, persistSession: false },
    });

    const app = document.getElementById("app");

    function renderForm() {
      app.innerHTML = `
        <h1>Set a new password</h1>
        <p class="subtitle">Choose a new password for your MileStory account.</p>
        <div id="banner"></div>
        <label>New password</label>
        <input id="password" type="password" placeholder="At least 8 characters" autocomplete="new-password" />
        <label>Confirm password</label>
        <input id="confirm" type="password" placeholder="Re-enter your password" autocomplete="new-password" />
        <p class="hint">Use at least 8 characters, with a mix of letters and numbers.</p>
        <button id="submit">Update password</button>
      `;

      document.getElementById("submit").addEventListener("click", updatePassword);
    }

    function renderError(message) {
      app.innerHTML = `
        <h1>Link expired or invalid</h1>
        <p class="subtitle">${message} Go back to the MileStory app and request a new reset link.</p>
      `;
    }

    function renderSuccess() {
      app.innerHTML = `
        <h1>Password updated</h1>
        <div class="message success">Your password has been changed. You can close this page and sign in with your new password in the MileStory app.</div>
      `;
    }

    function isStrongEnough(password) {
      return password.length >= 8 && /[a-zA-Z]/.test(password) && /[0-9]/.test(password);
    }

    async function updatePassword() {
      const banner = document.getElementById("banner");
      const password = document.getElementById("password").value;
      const confirm = document.getElementById("confirm").value;
      const submitButton = document.getElementById("submit");

      banner.innerHTML = "";

      if (!isStrongEnough(password)) {
        banner.innerHTML = `<div class="message error">Password must be at least 8 characters and include both a letter and a number.</div>`;
        return;
      }

      if (password !== confirm) {
        banner.innerHTML = `<div class="message error">Passwords do not match.</div>`;
        return;
      }

      submitButton.disabled = true;
      submitButton.textContent = "Updating\u2026";

      const { error } = await client.auth.updateUser({ password });

      if (error) {
        banner.innerHTML = `<div class="message error">${error.message}</div>`;
        submitButton.disabled = false;
        submitButton.textContent = "Update password";
        return;
      }

      renderSuccess();
    }

    (async () => {
      // Supabase JS auto-parses the recovery token from the URL when
      // detectSessionInUrl is true. Give it a brief moment, then check
      // whether we actually landed with a valid session.
      const params = new URLSearchParams(window.location.search);
      const hashParams = new URLSearchParams(window.location.hash.replace("#", "?"));
      const errorDescription =
        params.get("error_description") || hashParams.get("error_description");

      if (errorDescription) {
        renderError(decodeURIComponent(errorDescription.replace(/\+/g, " ")));
        return;
      }

      setTimeout(async () => {
        const { data } = await client.auth.getSession();

        if (data.session) {
          renderForm();
        } else {
          renderError("We couldn't verify this link.");
        }
      }, 600);
    })();
  </script>
</body>
</html>
