<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MileStory email verified</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #FCFAF7;
    color: #1D2228;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    text-align: center;
  }
  .card {
    width: 100%;
    max-width: 420px;
    background: #FFFFFF;
    border: 1px solid #E6E0DA;
    border-radius: 20px;
    padding: 36px 28px;
  }
  .logo {
    font-size: 15px;
    font-weight: 900;
    letter-spacing: -0.5px;
    color: #B45A2B;
    margin-bottom: 18px;
  }
  .icon {
    width: 56px;
    height: 56px;
    border-radius: 28px;
    background: #EAF6ED;
    color: #1E7B34;
    font-size: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 18px;
  }
  .icon.error {
    background: #FDEDEA;
    color: #B3261E;
  }
  h1 {
    font-size: 22px;
    font-weight: 900;
    margin: 0 0 10px;
  }
  p {
    color: #737A82;
    font-size: 14px;
    line-height: 20px;
    margin: 0;
  }
</style>
</head>
<body>
  <div class="card" id="app">
    <div class="logo">MileStory</div>
    <div class="icon">&#10003;</div>
    <h1>Email verified</h1>
    <p>Your MileStory account is confirmed. You can close this page and sign in from the app.</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const hashParams = new URLSearchParams(window.location.hash.replace("#", "?"));
    const errorDescription =
      params.get("error_description") || hashParams.get("error_description");

    if (errorDescription) {
      document.getElementById("app").innerHTML = `
        <div class="logo">MileStory</div>
        <div class="icon error">&#33;</div>
        <h1>Link expired or invalid</h1>
        <p>${decodeURIComponent(errorDescription.replace(/\+/g, " "))} Go back to the app and try signing up again, or contact support if this keeps happening.</p>
      `;
    }
  </script>
</body>
</html>
